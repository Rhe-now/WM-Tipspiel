<style>
  :root{

  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);
    -webkit-text-size-adjust:100%;line-height:1.45}
  h1,h2,h3{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.02em;margin:0}
  a{color:var(--pitch)}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px 64px}

  header{background:linear-gradient(160deg,var(--pitch) 0%,var(--pitch-dark) 100%);color:#fff;
    padding:22px 0 18px;position:relative;overflow:hidden}
  header .wrap{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding-bottom:0}
  header h1{font-size:30px;text-transform:uppercase;line-height:.98;font-weight:700}
  header .sub{font-size:12px;letter-spacing:.18em;text-transform:uppercase;opacity:.8;margin-top:4px}
  header::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;
    border:14px solid rgba(255,255,255,.06);border-radius:50%}
  .me-chip{font-size:13px;background:rgba(255,255,255,.14);padding:7px 11px;border-radius:999px;
    white-space:nowrap;display:flex;align-items:center;gap:7px}
  .me-chip b{font-weight:600}

  nav{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);
    display:flex;overflow-x:auto;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  nav button{flex:0 0 auto;background:none;border:none;padding:13px 14px;font-family:'Oswald',sans-serif;
    font-size:14px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);cursor:pointer;
    border-bottom:3px solid transparent}
  nav button.active{color:var(--ink);border-bottom-color:var(--gold)}

  .panel{padding-top:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;
    margin-bottom:14px;box-shadow:var(--shadow)}
  .card h2{font-size:19px;margin-bottom:2px;text-transform:uppercase}
  .card .hint{color:var(--muted);font-size:13px;margin:2px 0 12px}

  label{display:block;font-size:13px;font-weight:600;margin:10px 0 5px}
  input[type=text],input[type=password],input[type=number],select{width:100%;font:inherit;
    padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
  input:focus,select:focus,button:focus-visible{outline:2px solid var(--pitch);outline-offset:1px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font:inherit;font-weight:600;
    background:var(--pitch);color:#fff;border:none;padding:12px 16px;border-radius:10px;cursor:pointer}
  .btn:hover{filter:brightness(1.05)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.gold{background:var(--gold);color:#3a2c00}
  .btn.danger{background:var(--red)}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

  .group-title{display:flex;align-items:baseline;gap:8px;margin:18px 0 8px}
  .group-title h3{font-size:17px;text-transform:uppercase}
  .group-title span{font-size:12px;color:var(--muted)}

  .match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;
    padding:10px 0;border-top:1px solid var(--line)}
  .match:first-child{border-top:none}
  .team{display:flex;align-items:center;gap:7px;min-width:0}
  .team.home{justify-content:flex-end;text-align:right}
  .team .flag{font-size:20px;line-height:1}
  .team .nm{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .score{display:flex;align-items:center;gap:4px}
  .score input{width:40px;text-align:center;font-family:'Oswald';font-size:20px;font-weight:600;
    padding:6px 2px;background:var(--ink);color:#fff;border:none;border-radius:8px}
  .score input::-webkit-outer-spin-button,.score input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .score input[type=number]{-moz-appearance:textfield}
  .score .colon{color:var(--muted);font-weight:700}
  .mstatus{grid-column:1/-1;font-size:11px;color:var(--muted);display:flex;justify-content:space-between;
    gap:8px;margin-top:-2px}
  .mstatus .res{font-weight:600;color:var(--ink)}
  .mstatus .pts{color:var(--pitch);font-weight:600}
  .locked .score input{background:#9aa69d}

  table.lb{width:100%;border-collapse:collapse}
  table.lb th,table.lb td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);font-size:14px}
  table.lb th{font-family:'Oswald';text-transform:uppercase;font-size:12px;color:var(--muted);letter-spacing:.04em}
  table.lb td.num,table.lb th.num{text-align:right;font-variant-numeric:tabular-nums}
  table.lb td.pts{font-family:'Oswald';font-size:18px;font-weight:600}
  table.lb tr.me{background:#fffaf0}
  .rank{font-family:'Oswald';font-weight:600;color:var(--muted);width:28px}
  .rank.medal1{color:#caa100}.rank.medal2{color:#8a8f93}.rank.medal3{color:#a4682f}

  .order-list{list-style:none;margin:0;padding:0}
  .order-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .order-row:first-child{border-top:none}
  .order-row .pos{font-family:'Oswald';font-weight:700;width:22px;color:var(--pitch)}
  .order-row .grow{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
  .order-row .nm{font-weight:500}
  .order-row.qual{}
  .order-row .qbadge{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--pitch);
    border:1px solid var(--pitch);border-radius:6px;padding:1px 5px}
  .arrows{display:flex;flex-direction:column;gap:2px}
  .arrows button{background:#fff;border:1px solid var(--line);border-radius:6px;width:30px;height:22px;
    cursor:pointer;line-height:1;font-size:12px}

  .note{font-size:12px;color:var(--muted)}
  .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:10px 16px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:50}
  .toast.show{opacity:1}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;background:#eef2ec;color:var(--muted)}
  .pill.live{background:#fdecea;color:var(--red)}
  .pill.done{background:#e7f3ec;color:var(--pitch)}
  .setup-warn{background:#fff6e5;border:1px solid #f0d8a0;color:#6b5200;border-radius:12px;padding:14px;
    font-size:14px;margin-bottom:14px}
  details summary{cursor:pointer;font-weight:600;font-size:14px}
  footer{margin-top:24px;font-size:12px;color:var(--muted);text-align:center}
  .empty{text-align:center;color:var(--muted);padding:26px 8px;font-size:14px}
  @media (max-width:420px){
    header h1{font-size:24px}
    .team .nm{font-size:13px}
    .score input{width:36px;font-size:18px}
  }
</style>

function flag(t){return FLAGS[t]||"🏳️";}
function groupOf(home,away){const g=TEAM2GROUP[home];return (g && g===TEAM2GROUP[away])?g:null;}
function fmtKick(iso){if(!iso)return"";const d=new Date(iso);if(isNaN(d))return"";
  return d.toLocaleString('de-CH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function isLocked(m){if(m.status==='finished')return true;if(!m.kickoff)return false;return new Date(m.kickoff)<=new Date();}
function tendency(h,a){return h>a?'H':(h<a?'A':'D');}
function matchPoints(ph,pa,rh,ra,sc){
  if(ph==null||pa==null||rh==null||ra==null)return 0;
  if(ph===rh&&pa===ra)return sc.exact;
  if(tendency(ph,pa)!==tendency(rh,ra))return 0;
  if((ph-pa)===(rh-ra))return sc.gd;
  return sc.tendency;
}

/* ---------- Standings ---------- */
function groupMatches(g){return S.matches.filter(m=>m.stage==='group'&&m.group_code===g);}
function groupFinished(g){const ms=groupMatches(g);return ms.length>=6 && ms.filter(m=>m.status==='finished').length>=6;}
function computeStandings(g){
  const ms=groupMatches(g).filter(m=>m.status==='finished'&&m.home_score!=null&&m.away_score!=null);
  const stats={};GROUPS[g].forEach(t=>stats[t]={t,pld:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
  ms.forEach(m=>{
    const h=stats[m.home_team],a=stats[m.away_team];if(!h||!a)return;
    h.pld++;a.pld++;h.gf+=m.home_score;h.ga+=m.away_score;a.gf+=m.away_score;a.ga+=m.home_score;
    if(m.home_score>m.away_score){h.pts+=3;h.w++;a.l++;}
    else if(m.home_score<m.away_score){a.pts+=3;a.w++;h.l++;}
    else{h.pts++;a.pts++;h.d++;a.d++;}
  });
  const arr=Object.values(stats).map(s=>({...s,gd:s.gf-s.ga}));
  // FIFA-Reihenfolge: 1) Punkte 2) Tordiff 3) Tore  -> bei Gleichstand: direkter Vergleich (nur Spiele unter den punktgleichen Teams)
  function h2h(subset){
    const set=new Set(subset);const sub={};subset.forEach(t=>sub[t]={pts:0,gf:0,ga:0});
    ms.forEach(m=>{if(set.has(m.home_team)&&set.has(m.away_team)){
      const h=sub[m.home_team],a=sub[m.away_team];
      h.gf+=m.home_score;h.ga+=m.away_score;a.gf+=m.away_score;a.ga+=m.home_score;
      if(m.home_score>m.away_score)h.pts+=3;else if(m.home_score<m.away_score)a.pts+=3;else{h.pts++;a.pts++;}
    }});
    Object.keys(sub).forEach(t=>sub[t].gd=sub[t].gf-sub[t].ga);
    return sub;
  }
  arr.sort((x,y)=>y.pts-x.pts||y.gd-x.gd||y.gf-x.gf||0);
  let i=0;
  while(i<arr.length){
    let j=i+1;
    while(j<arr.length&&arr[j].pts===arr[i].pts&&arr[j].gd===arr[i].gd&&arr[j].gf===arr[i].gf)j++;
    if(j-i>1){
      const H=h2h(arr.slice(i,j).map(s=>s.t));
      const sorted=arr.slice(i,j).sort((x,y)=>H[y.t].pts-H[x.t].pts||H[y.t].gd-H[x.t].gd||H[y.t].gf-H[x.t].gf||x.t.localeCompare(y.t));
      for(let k=0;k<sorted.length;k++)arr[i+k]=sorted[k];
    }
    i=j;
  }
  return arr;
}

/* ---------- Leaderboard ---------- */
function leaderboard(){
  const sc=S.cfg?.scoring||DEFAULT_SCORING;
  const finishedByKey={};S.matches.forEach(m=>{if(m.status==='finished')finishedByKey[m.match_key]=m;});
  const completedGroups=Object.keys(GROUPS).filter(groupFinished);
  const actualOrder={};completedGroups.forEach(g=>actualOrder[g]=computeStandings(g).map(s=>s.t));
  const byPlayer={};S.players.forEach(p=>byPlayer[p.id]={id:p.id,name:p.name,match:0,place:0});
  S.finishedPreds.forEach(pr=>{
    const m=finishedByKey[pr.match_key];const rec=byPlayer[pr.player_id];if(!m||!rec)return;
    rec.match+=matchPoints(pr.pred_home,pr.pred_away,m.home_score,m.away_score,sc);
  });
  // Platzierung: für jeden Spieler in jeder abgeschlossenen Gruppe zählt die angezeigte Reihenfolge
  // (gespeicherter Tipp, sonst Standard-Auslosungsreihenfolge).
  const savedMap={};S.completedOrders.forEach(o=>{(savedMap[o.player_id]=savedMap[o.player_id]||{})[o.group_code]=o.ordering;});
  S.players.forEach(p=>{
    const rec=byPlayer[p.id];if(!rec)return;
    completedGroups.forEach(g=>{
      const act=actualOrder[g];if(!act)return;
      const ord=(savedMap[p.id]&&savedMap[p.id][g])?savedMap[p.id][g]:GROUPS[g];
      ord.forEach((t,i)=>{if(act[i]===t)rec.place+=sc.position;});
    });
  });
  const arr=Object.values(byPlayer).map(r=>({...r,total:r.match+r.place}));
  arr.sort((a,b)=>b.total-a.total||a.name.localeCompare(b.name));
  return {rows:arr,completedGroups};
}

/* ---------- API: Spielplan + Resultate ---------- */
function buildMatchesFromApi(events, existing){
  const exMap={};(existing||[]).forEach(m=>exMap[m.match_key]=m);
  const rows=[];
  (events||[]).forEach((e,idx)=>{
    if(!e.strHomeTeam||!e.strAwayTeam)return;
    if(isPlaceholder(e.strHomeTeam)||isPlaceholder(e.strAwayTeam))return; // Platzhalter (z.B. "Winner Group A") ignorieren
    const home=canon(e.strHomeTeam),away=canon(e.strAwayTeam);
    if(!TEAM2GROUP[home]||!TEAM2GROUP[away])return; // nur erkannte WM-Teams übernehmen
    const g=groupOf(home,away);
    const key='tsdb_'+e.idEvent;
    const prev=exMap[key]||{};
    let hs=(e.intHomeScore!=null&&e.intHomeScore!=='')?parseInt(e.intHomeScore,10):null;
    let as=(e.intAwayScore!=null&&e.intAwayScore!=='')?parseInt(e.intAwayScore,10):null;
    const kickoff=e.strTimestamp||(e.dateEvent?(e.dateEvent+'T'+((e.strTime&&e.strTime!=='00:00:00')?e.strTime:'12:00:00')):null);
    const statusStr=(e.strStatus||'')+' '+(e.strProgress||'');
    let finished=/FT|Finished|AET|After|Pen|Full/i.test(statusStr) || (hs!=null&&as!=null&&kickoff&&new Date(kickoff)<new Date());
    // API ohne Score -> bestehenden (evtl. manuell gesetzten) Wert behalten
    if(hs==null&&prev.home_score!=null){hs=prev.home_score;as=prev.away_score;finished=prev.status==='finished';}
    rows.push({
      match_key:key, stage:g?'group':'ko', group_code:g,
      round_label:g?null:(e.strEvent||null),
      home_team:home, away_team:away, kickoff,
      home_score:hs, away_score:as, status:finished?'finished':'scheduled',
      sort_order:idx, updated_at:new Date().toISOString()
    });
  });
  return rows;
}
async function fetchSchedule(apiKey,deep){
  // Gratis-Key liefert pro Methode nur ein Fenster -> mehrere Endpunkte kombinieren.
  // Wird wiederholt aufgerufen; per upsert akkumuliert sich so der ganze Spielplan.
  const k=encodeURIComponent(apiKey||'123');
  const base=`https://www.thesportsdb.com/api/v1/json/${k}/`;
  const urls=[
    `eventsnextleague.php?id=${WC_LEAGUE_ID}`,
    `eventspastleague.php?id=${WC_LEAGUE_ID}`,
    `eventsseason.php?id=${WC_LEAGUE_ID}&s=${WC_SEASON}`
  ];
  // Tiefer Abruf (Admin): K.-o.-Runden gezielt nachladen (Filter verwerfen alles Ungültige)
  if(deep){[32,16,8,4,2].forEach(r=>urls.push(`eventsround.php?id=${WC_LEAGUE_ID}&r=${r}&s=${WC_SEASON}`));}
  const map={};let okAny=false,lastErr=null;
  for(const u of urls){
    try{
      const r=await fetch(base+u);
      if(!r.ok){lastErr=new Error('HTTP '+r.status);continue;}
      const j=await r.json();okAny=true;
      (j&&j.events?j.events:[]).forEach(e=>{if(e&&e.idEvent)map[e.idEvent]=e;});
    }catch(e){lastErr=e;}
  }
  if(!okAny&&lastErr)throw lastErr;
  return Object.values(map);
}
async function importSchedule(apiKey,deep){
  // Holt API-Events und trägt Resultate in die festen Spiele ein (keine Duplikate).
  const events=await fetchSchedule(apiKey,deep);
  if(!events.length)return {count:S.matches.length,results:S.matches.filter(m=>m.status==='finished').length};
  const groupsDone=Object.keys(GROUPS).every(groupFinished);
  let updated=0; const koRows=[];
  for(const e of events){
    if(isPlaceholder(e.strHomeTeam)||isPlaceholder(e.strAwayTeam))continue;
    const home=canon(e.strHomeTeam),away=canon(e.strAwayTeam);
    if(!TEAM2GROUP[home]||!TEAM2GROUP[away])continue;
    let hs=(e.intHomeScore!=null&&e.intHomeScore!=='')?parseInt(e.intHomeScore,10):null;
    let as=(e.intAwayScore!=null&&e.intAwayScore!=='')?parseInt(e.intAwayScore,10):null;
    const kickoff=e.strTimestamp||null;
    const statusStr=(e.strStatus||'')+' '+(e.strProgress||'');
    const finishedFlag=/FT|Finished|AET|After|Pen|Full/i.test(statusStr)||(hs!=null&&as!=null&&kickoff&&new Date(kickoff)<new Date());
    const g=groupOf(home,away);
    if(g){
      const fx=S.matches.find(m=>m.stage==='group'&&((m.home_team===home&&m.away_team===away)||(m.home_team===away&&m.away_team===home)));
      if(!fx)continue;
      let H=hs,A=as; if(fx.home_team===away){H=as;A=hs;} // Orientierung angleichen
      const upd={updated_at:new Date().toISOString()}; let changed=false;
      if(H!=null&&A!=null&&(fx.home_score!==H||fx.away_score!==A)){upd.home_score=H;upd.away_score=A;changed=true;}
      if(finishedFlag&&fx.status!=='finished'){upd.status='finished';changed=true;}
      if(kickoff&&!fx.kickoff){upd.kickoff=kickoff;changed=true;}
      if(changed){const {error}=await db.from('matches').update(upd).eq('match_key',fx.match_key);if(!error)updated++;}
    } else {
      // echtes K.-o.-Spiel: erst nach Abschluss der Gruppenphase zulassen
      if(!groupsDone)continue;
      // bestehendes K.-o.-Spiel (manuell oder API) mit gleicher Paarung aktualisieren statt doppeln
      const ex=S.matches.find(m=>m.stage!=='group'&&((m.home_team===home&&m.away_team===away)||(m.home_team===away&&m.away_team===home)));
      if(ex){
        let H=hs,A=as; if(ex.home_team===away){H=as;A=hs;}
        const upd={updated_at:new Date().toISOString()};let changed=false;
        if(H!=null&&A!=null&&(ex.home_score!==H||ex.away_score!==A)){upd.home_score=H;upd.away_score=A;changed=true;}
        if(finishedFlag&&ex.status!=='finished'){upd.status='finished';changed=true;}
        if(kickoff&&!ex.kickoff){upd.kickoff=kickoff;changed=true;}
        if(changed){const {error}=await db.from('matches').update(upd).eq('match_key',ex.match_key);if(!error)updated++;}
      } else {
        koRows.push({match_key:'tsdb_'+e.idEvent,stage:'ko',group_code:null,round_label:e.strEvent||null,
          home_team:home,away_team:away,kickoff,home_score:hs,away_score:as,
          status:finishedFlag?'finished':'scheduled',sort_order:9000,updated_at:new Date().toISOString()});
      }
    }
  }
  if(koRows.length){await db.from('matches').upsert(koRows,{onConflict:'match_key'});}
  if(updated||koRows.length)await loadMatches();
  return {count:S.matches.length,results:S.matches.filter(m=>m.status==='finished').length};
}
// Stellt sicher, dass der feste Gruppen-Spielplan vorhanden und aktuell ist.
// Bestehende Spiele werden bei Datums-/Team-Abweichung korrigiert (Resultate/Tipps bleiben unangetastet, da der Spiel-Schlüssel gleich bleibt).
async function ensureFixtures(){
  const legacy=S.matches.filter(m=>m.stage==='group'&&String(m.match_key).startsWith('tsdb_'));
  if(legacy.length){try{await db.from('matches').delete().in('match_key',legacy.map(m=>m.match_key));}catch(e){console.warn('Legacy:',e.message);}}
  let changed=legacy.length>0;
  const byKey={}; S.matches.forEach(m=>byKey[m.match_key]=m);
  const toInsert=[];
  for(const f of GROUP_FIXTURES){
    const ex=byKey[f.key];
    if(!ex){
      toInsert.push({match_key:f.key,stage:'group',group_code:f.group,round_label:null,
        home_team:f.home,away_team:f.away,kickoff:f.ko,home_score:null,away_score:null,
        status:'scheduled',sort_order:f.sort,updated_at:new Date().toISOString()});
    } else {
      const sameTime=ex.kickoff&&(new Date(ex.kickoff).getTime()===new Date(f.ko).getTime());
      if(!sameTime||ex.home_team!==f.home||ex.away_team!==f.away||ex.group_code!==f.group){
        try{await db.from('matches').update({kickoff:f.ko,home_team:f.home,away_team:f.away,group_code:f.group,sort_order:f.sort,updated_at:new Date().toISOString()}).eq('match_key',f.key);changed=true;}
        catch(e){console.warn('Fixture-Update:',e.message);}
      }
    }
  }
  if(toInsert.length){for(let i=0;i<toInsert.length;i+=200){await db.from('matches').upsert(toInsert.slice(i,i+200),{onConflict:'match_key'});}changed=true;}
  if(changed)await loadMatches();
}

let saveTimers={};
async function savePrediction(key){
  if(!S.me){toast('Bitte zuerst anmelden (Tab „Ich“)');return;}
  const m=S.matches.find(x=>x.match_key===key);
  if(m&&isLocked(m)){toast('Spiel bereits gestartet – Tipp gesperrt');render();return;}
  const hi=document.querySelector(`input[data-h="${CSS.escape(key)}"]`);
  const ai=document.querySelector(`input[data-a="${CSS.escape(key)}"]`);
  const ph=hi.value===''?null:parseInt(hi.value,10);
  const pa=ai.value===''?null:parseInt(ai.value,10);
  if(ph==null||pa==null)return; // erst speichern, wenn beide gesetzt
  S.myPreds[key]={pred_home:ph,pred_away:pa};
  const {error}=await db.from('predictions').upsert(
    {player_id:S.me.id,match_key:key,pred_home:ph,pred_away:pa,updated_at:new Date().toISOString()},
    {onConflict:'player_id,match_key'});
  if(error){toast('Fehler beim Speichern');console.error(error);}else toast('Tipp gespeichert');
}
function queueSave(key){clearTimeout(saveTimers[key]);saveTimers[key]=setTimeout(()=>savePrediction(key),500);}

async function saveOrder(g){
  if(!S.me){toast('Bitte zuerst anmelden');return;}
  const ord=S.myOrders[g];
  const {error}=await db.from('group_predictions').upsert(
    {player_id:S.me.id,group_code:g,ordering:ord,updated_at:new Date().toISOString()},
    {onConflict:'player_id,group_code'});
  if(error){toast('Fehler beim Speichern');console.error(error);}else{S.savedGroups.add(g);toast('Platzierung gespeichert');}
}
function groupLockedForPlacement(g){
  const ms=groupMatches(g);if(!ms.length)return false;
  const first=ms.map(m=>m.kickoff).filter(Boolean).sort()[0];
  return first?new Date(first)<=new Date():false;
}

  const {rows,completedGroups}=leaderboard();
  const anyFinished=S.matches.some(m=>m.status==='finished');
  let body=rows.map((r,i)=>{
    const medal=i<3?`medal${i+1}`:'';
    const meCls=S.me&&r.id===S.me.id?'me':'';
    return `<tr class="${meCls}"><td class="rank ${medal}">${i+1}</td><td>${esc(r.name)}</td>
      <td class="num">${r.match}</td><td class="num">${r.place}</td><td class="num pts">${r.total}</td></tr>`;
  }).join('');
  if(!rows.length)body=`<tr><td colspan="5" class="empty">Noch keine Mitspieler. Sei der/die Erste im Tab „Ich“.</td></tr>`;
  return `<div class="card">
    <h2>Rangliste</h2>

      <tr><td>Richtiger Sieger / Tendenz</td><td class="num pts">${S.cfg?.scoring?.tendency??2}</td></tr>

  const pr=S.myPreds[m.match_key]||{};

  const hv=pr.pred_home!=null?pr.pred_home:'';
  const av=pr.pred_away!=null?pr.pred_away:'';
  let statusLeft='', statusRight='';
  if(m.status==='finished'&&m.home_score!=null){
    statusLeft=`<span class="res">Endstand ${m.home_score}:${m.away_score}</span>`;
    if(pr.pred_home!=null){const pts=matchPoints(pr.pred_home,pr.pred_away,m.home_score,m.away_score,sc);
      statusRight=`<span class="pts">+${pts} Pkt</span>`;}
  }else{
    statusLeft=`<span>${m.kickoff?fmtKick(m.kickoff):''}</span>`;
    statusRight=locked?'<span class="pill live">gesperrt</span>':'';
  }
  return `<div class="match ${locked?'locked':''}">

    </div>

  }
  let html=`<div class="card"><h2>Gruppen tippen</h2><div class="hint">Alle Gruppenspiele sind tippbar. Tipp pro Spiel eingeben – wird automatisch gespeichert. Gesperrt ab Anpfiff.</div>`;
  Object.keys(GROUPS).forEach(g=>{
    const ms=groupMatches(g).slice().sort((a,b)=>(a.sort_order-b.sort_order)||String(a.kickoff).localeCompare(String(b.kickoff)));
    if(!ms.length)return;
    html+=`<div class="group-title"><h3>Gruppe ${g}</h3><span>${GROUPS[g].map(flag).join(' ')}</span></div>`;
    html+=ms.map(scoreMatchHTML).join('');
  });
  html+=`</div>`;
  p.innerHTML=html;
  attachScoreInputs(p);
}

function renderKO(p){
  const ms=S.matches.filter(m=>m.stage!=='group').slice().sort((a,b)=>(a.sort_order-b.sort_order)||String(a.kickoff).localeCompare(String(b.kickoff)));
  if(!ms.length){p.innerHTML=`<div class="card"><h2>K.-o.-Runde</h2><div class="empty">K.-o.-Spiele erscheinen, sobald die Paarungen feststehen und der Admin den Spielplan aktualisiert.</div></div>`;return;}
  let html=`<div class="card"><h2>K.-o.-Runde</h2><div class="hint">Getippt wird der reguläre Spielstand (ohne Elfmeterschiessen).</div>`;
  html+=ms.map(scoreMatchHTML).join('');
  html+=`</div>`;
  p.innerHTML=html;
  attachScoreInputs(p);
}

function attachScoreInputs(root){
  root.querySelectorAll('input[data-h],input[data-a]').forEach(inp=>{
    const key=inp.getAttribute('data-h')||inp.getAttribute('data-a');
    inp.addEventListener('change',()=>savePrediction(key));
  });
}

function renderPlacement(p){
  if(!S.matches.some(m=>m.stage==='group')){
    p.innerHTML=`<div class="card"><h2>Platzierung tippen</h2><div class="empty">Spielplan noch nicht geladen (siehe Tab „Admin“). Die Gruppen kannst du trotzdem unten ordnen.</div></div>`;
  }
  let html=`<div class="card"><h2>Platzierung tippen</h2><div class="hint">Bring die 4 Teams jeder Gruppe in die erwartete Endreihenfolge (1 = Gruppensieger). Plätze 1–2 = Achtelfinal-Quali. Gesperrt ab dem ersten Gruppenspiel. <b>Die angezeigte Reihenfolge zählt</b> – auch unverändert übernommene.</div>`;
  const sc=S.cfg?.scoring||DEFAULT_SCORING;
  Object.keys(GROUPS).forEach(g=>{
    if(!S.myOrders[g])S.myOrders[g]=GROUPS[g].slice();
    const ord=S.myOrders[g];
    const locked=groupLockedForPlacement(g);
    const finished=groupFinished(g);
    const actual=finished?computeStandings(g).map(s=>s.t):null;
    let badge='';
    if(finished)badge='<span class="pill done">abgeschlossen</span>';
    else if(locked)badge='<span class="pill live">gesperrt</span>';
    html+=`<div class="group-title"><h3>Gruppe ${g}</h3>${badge}</div>`;
    html+=`<ul class="order-list" data-group="${g}">`;
    let correct=0;
    ord.forEach((t,i)=>{
      let mark='';
      if(actual){const ok=actual[i]===t;if(ok)correct++;mark=ok?' ✓':' ✗';}
      html+=`<li class="order-row ${i<2?'qual':''}">
        <span class="pos">${i+1}</span>
        <span class="grow"><span class="flag">${flag(t)}</span><span class="nm">${esc(t)}${mark}</span> ${i<2?'<span class="qbadge">Quali</span>':''}</span>
        ${locked?'':`<span class="arrows">
          <button data-up="${g}:${i}" ${i===0?'disabled':''} aria-label="hoch">▲</button>
          <button data-down="${g}:${i}" ${i===3?'disabled':''} aria-label="runter">▼</button>
        </span>`}
      </li>`;
    });
    html+=`</ul>`;
    if(finished){
      html+=`<div class="note" style="margin:6px 0 2px">Tatsächlich: ${actual.map((t,i)=>`${i+1}.&nbsp;${flag(t)}`).join('  ')}  ·  <b style="color:var(--pitch)">${correct}/4 richtig = +${correct*sc.position} Pkt</b></div>`;
    }
  });
  html+=`</div>`;
  p.innerHTML=html;
  p.querySelectorAll('button[data-up],button[data-down]').forEach(b=>{
    b.addEventListener('click',()=>{
      const up=b.hasAttribute('data-up');
      const [g,iStr]=(b.getAttribute('data-up')||b.getAttribute('data-down')).split(':');
      const i=parseInt(iStr,10);const ord=S.myOrders[g];const j=up?i-1:i+1;
      if(j<0||j>3)return;[ord[i],ord[j]]=[ord[j],ord[i]];
      saveOrder(g);render();
    });
  });
}

function renderMe(p){
  if(S.me){
    p.innerHTML=`<div class="card"><h2>Angemeldet</h2>
      <div class="hint">Du tippst als <b>${esc(S.me.name)}</b>. Auf anderen Geräten meldest du dich mit gleichem Namen + PIN an.</div>
      <button class="btn ghost" id="logout">Abmelden</button></div>`;
    $('#logout').addEventListener('click',()=>{localStorage.removeItem('wm26_me');S.me=null;S.myPreds={};S.myOrders={};S.savedGroups=new Set();toast('Abgemeldet');render();});
    return;
  }
  p.innerHTML=`<div class="card"><h2>Mitmachen</h2>
    <div class="hint">Name wählen und eine persönliche PIN setzen (4–8 Zeichen). Mit Name + PIN tippst du von jedem Gerät.</div>
    <label>Name</label><input type="text" id="inName" maxlength="24" placeholder="z.B. Rhe">
    <label>PIN</label><input type="password" id="inPin" maxlength="8" placeholder="persönliche PIN">
    <div class="row" style="margin-top:14px"><button class="btn" id="loginBtn">Anmelden / Registrieren</button></div>
    <div class="note" style="margin-top:10px">Hinweis: Dies ist ein Familien-/Freundes-Tippspiel ohne echte Kontosicherheit. Die PIN schützt deine Tipps nur leicht.</div>
  </div>`;
  $('#loginBtn').addEventListener('click',login);
}
async function login(){
  const name=$('#inName').value.trim();const pin=$('#inPin').value.trim();
  if(name.length<2){toast('Name zu kurz');return;}
  if(pin.length<4){toast('PIN min. 4 Zeichen');return;}
  const {data:existing}=await db.from('players').select('*').eq('name',name).maybeSingle();
  if(existing){
    if(existing.pin!==pin){toast('Falsche PIN für diesen Namen');return;}
    S.me=existing;
  }else{
    const {data,error}=await db.from('players').insert({name,pin}).select().single();
    if(error){toast('Name evtl. schon vergeben');console.error(error);return;}
    S.me=data;
  }
  localStorage.setItem('wm26_me',JSON.stringify({id:S.me.id,name:S.me.name,pin:S.me.pin}));
  await loadMine();await loadPlayers();
  toast('Willkommen, '+S.me.name);
  setTab('groups');
}

/* ---------- Admin ---------- */
function renderAdmin(p){
  // Erst-Setup
  if(!S.cfg||!S.cfg.admin_pin){
    p.innerHTML=`<div class="card"><h2>Erst-Einrichtung</h2>
      <div class="hint">Einmalig den Namen des Tippspiels und eine Admin-PIN festlegen.</div>
      <label>Name des Tippspiels</label><input type="text" id="setName" value="${esc(S.cfg?.league_name||'WM 2026 Tippspiel')}">
      <label>Admin-PIN</label><input type="password" id="setPin" maxlength="12" placeholder="Admin-PIN">
      <div class="row" style="margin-top:14px"><button class="btn" id="setupBtn">Speichern</button></div></div>`;
    $('#setupBtn').addEventListener('click',async()=>{
      const ln=$('#setName').value.trim()||'WM 2026 Tippspiel';const pin=$('#setPin').value.trim();
      if(pin.length<4){toast('Admin-PIN min. 4 Zeichen');return;}
      const {error}=await db.from('config').upsert({id:1,league_name:ln,admin_pin:pin,scoring:DEFAULT_SCORING,api_key:'123'},{onConflict:'id'});
      if(error){toast('Fehler');console.error(error);return;}
      await loadConfig();S.adminAuthed=true;toast('Eingerichtet');render();
    });
    return;
  }
  if(!S.adminAuthed){
    p.innerHTML=`<div class="card"><h2>Admin</h2><div class="hint">Admin-PIN eingeben.</div>
      <label>Admin-PIN</label><input type="password" id="adPin" maxlength="12">
      <div class="row" style="margin-top:14px"><button class="btn" id="adBtn">Entsperren</button></div></div>`;
    $('#adBtn').addEventListener('click',()=>{
      if($('#adPin').value.trim()===S.cfg.admin_pin){S.adminAuthed=true;render();}
      else toast('Falsche Admin-PIN');
    });
    return;
  }
  const sc=S.cfg.scoring||DEFAULT_SCORING;
  const finished=S.matches.filter(m=>m.status==='finished').length;
  p.innerHTML=`
  <div class="card"><h2>Resultate &amp; Spielplan</h2>
    <div class="hint">${S.matches.length} Spiele im System, davon ${finished} mit Resultat.</div>
    <label>TheSportsDB API-Key</label>
    <input type="text" id="apiKey" value="${esc(S.cfg.api_key||'123')}">
    <div class="note" style="margin:6px 0 12px">Der komplette Gruppen-Spielplan (alle 72 Spiele) ist fest eingebaut – Tippen ist sofort möglich. Dieser Abruf holt nur die <b>Resultate</b> (und später die K.-o.-Paarungen) von TheSportsDB. Gratis-Key ist <code>123</code>; er liefert pro Abruf ein Fenster der zuletzt gespielten Partien. Nach jeder Spielrunde abrufen – oder Resultate unten manuell eintragen.</div>
    <div class="row"><button class="btn gold" id="fetchBtn">Spielplan &amp; Resultate abrufen</button>
    <button class="btn ghost sm" id="refreshBtn">Neu laden</button></div>
    <div id="fetchMsg" class="note" style="margin-top:10px"></div>
  </div>

  <div class="card"><h2>Resultate manuell</h2>
    <div class="hint">Chronologisch sortiert. Endstand eintragen und auf „beendet“ setzen – wird sofort in die Punkte einberechnet.</div>
    <div id="adminMatches"></div>
  </div>

  <div class="card"><h2>K.-o.-Spiel manuell hinzufügen</h2>
    <div class="hint">Falls eine Paarung nicht automatisch erscheint, hier selbst anlegen. Mitspieler können sie danach tippen (bis zum Anpfiff), Resultat trägst du oben ein.</div>
    <label>Heim</label>
    <select id="koHome">${ALL_TEAMS.map(t=>`<option value="${esc(t)}">${flag(t)} ${esc(t)}</option>`).join('')}</select>
    <label>Auswärts</label>
    <select id="koAway">${ALL_TEAMS.map(t=>`<option value="${esc(t)}">${flag(t)} ${esc(t)}</option>`).join('')}</select>
    <label>Anpfiff</label>
    <input type="datetime-local" id="koWhen">
    <div class="row" style="margin-top:12px"><button class="btn" id="koAdd">K.-o.-Spiel anlegen</button></div>
    <div id="koMsg" class="note" style="margin-top:8px"></div>
  </div>

  <div class="card"><h2>Punkteregeln</h2>
    <div class="row">
      <div style="flex:1;min-width:120px"><label>Exaktes Resultat</label><input type="number" id="scExact" value="${sc.exact}"></div>
      <div style="flex:1;min-width:120px"><label>Tordifferenz</label><input type="number" id="scGd" value="${sc.gd}"></div>
    </div>
    <div class="row">
      <div style="flex:1;min-width:120px"><label>Tendenz/Sieger</label><input type="number" id="scTend" value="${sc.tendency}"></div>
      <div style="flex:1;min-width:120px"><label>Platzierung (pro Team)</label><input type="number" id="scPos" value="${sc.position}"></div>
    </div>
    <div class="row" style="margin-top:12px"><button class="btn" id="saveScoring">Regeln speichern</button></div>
  </div>`;

  $('#fetchBtn').addEventListener('click',async()=>{
    const btn=$('#fetchBtn');btn.disabled=true;$('#fetchMsg').textContent='Abruf läuft…';
    try{
      const key=$('#apiKey').value.trim()||'123';
      if(key!==S.cfg.api_key){await db.from('config').update({api_key:key}).eq('id',1);S.cfg.api_key=key;}
      const res=await importSchedule(key,true);
      const ko=S.matches.filter(m=>m.stage!=='group').length;
      if(res.count===0){$('#fetchMsg').innerHTML='Die API lieferte 0 Spiele. Möglich: Methode auf dem Gratis-Key gesperrt. Bitte manuell erfassen oder Premium-Key testen.';}
      else{$('#fetchMsg').innerHTML=`Aktualisiert. Spiele im System: ${res.count}, davon mit Resultat: ${res.results}. K.-o.-Spiele: <b>${ko}</b>.`+(ko<16?' (Fehlende Achtelfinals erscheinen, sobald die Quelle beide Teams benennt – oder unten manuell anlegen.)':'');await loadScoringInputs();}
      renderAdmin($('#panel'));
    }catch(e){console.error(e);$('#fetchMsg').innerHTML='Abruf fehlgeschlagen: '+esc(e.message)+'. (CORS/Netz/Key prüfen, oder manuell erfassen.)';btn.disabled=false;}
  });
  $('#refreshBtn').addEventListener('click',async()=>{await loadAll();renderAdmin($('#panel'));toast('Neu geladen');});
  $('#saveScoring').addEventListener('click',async()=>{
    const ns={exact:+$('#scExact').value,gd:+$('#scGd').value,tendency:+$('#scTend').value,position:+$('#scPos').value};
    const {error}=await db.from('config').update({scoring:ns}).eq('id',1);
    if(error){toast('Fehler');return;}S.cfg.scoring=ns;toast('Regeln gespeichert');
  });
  const koAddBtn=$('#koAdd');
  if(koAddBtn)koAddBtn.addEventListener('click',async()=>{
    const home=$('#koHome').value, away=$('#koAway').value, when=$('#koWhen').value;
    if(home===away){$('#koMsg').textContent='Heim und Auswärts müssen verschieden sein.';return;}
    const exists=S.matches.find(m=>m.stage!=='group'&&((m.home_team===home&&m.away_team===away)||(m.home_team===away&&m.away_team===home)));
    if(exists){$('#koMsg').textContent='Diese Paarung existiert bereits.';return;}
    const kickoff=when?new Date(when).toISOString():null;
    const row={match_key:'man_ko_'+Date.now(),stage:'ko',group_code:null,round_label:'K.-o.-Runde',
      home_team:home,away_team:away,kickoff,home_score:null,away_score:null,status:'scheduled',sort_order:9000,updated_at:new Date().toISOString()};
    const {error}=await db.from('matches').upsert(row,{onConflict:'match_key'});
    if(error){$('#koMsg').textContent='Fehler: '+error.message;return;}
    await loadMatches();toast('K.-o.-Spiel angelegt');renderAdmin($('#panel'));
  });
  renderAdminMatches();
}
function renderAdminMatches(){
  const host=$('#adminMatches');if(!host)return;
  if(!S.matches.length){host.innerHTML='<div class="empty">Noch keine Spiele. Erst Spielplan abrufen.</div>';return;}
  const ms=S.matches.slice().sort((a,b)=>(a.sort_order-b.sort_order)||String(a.kickoff).localeCompare(String(b.kickoff)));
  host.innerHTML=ms.map(m=>`
    <div class="match">
      <div class="team home"><span class="nm">${esc(m.home_team)}</span><span class="flag">${flag(m.home_team)}</span></div>
      <div class="score">
        <input type="number" inputmode="numeric" min="0" max="30" data-rh="${esc(m.match_key)}" value="${m.home_score!=null?m.home_score:''}">
        <span class="colon">:</span>
        <input type="number" inputmode="numeric" min="0" max="30" data-ra="${esc(m.match_key)}" value="${m.away_score!=null?m.away_score:''}">
      </div>
      <div class="team away"><span class="flag">${flag(m.away_team)}</span><span class="nm">${esc(m.away_team)}</span></div>
      <div class="mstatus">
        <span>${m.group_code?('Gruppe '+m.group_code):'K.o.'} · ${m.kickoff?fmtKick(m.kickoff):'—'}</span>
        <button class="btn sm ${m.status==='finished'?'':'ghost'}" data-fin="${esc(m.match_key)}">${m.status==='finished'?'beendet ✓':'als beendet speichern'}</button>
      </div>
    </div>`).join('');
  host.querySelectorAll('button[data-fin]').forEach(b=>{
    b.addEventListener('click',async()=>{
      const key=b.getAttribute('data-fin');
      const rh=host.querySelector(`input[data-rh="${CSS.escape(key)}"]`).value;
      const ra=host.querySelector(`input[data-ra="${CSS.escape(key)}"]`).value;
      if(rh===''||ra===''){toast('Beide Tore eingeben');return;}
      const {error}=await db.from('matches').update({home_score:+rh,away_score:+ra,status:'finished',updated_at:new Date().toISOString()}).eq('match_key',key);
      if(error){toast('Fehler');console.error(error);return;}
      await loadMatches();await loadScoringInputs();toast('Resultat gespeichert');renderAdmin($('#panel'));
    });
  });
}

/* ============================================================
   7) INIT
   ============================================================ */
async function backgroundRefresh(){
  try{
    const before=S.matches.length;
    const finishedBefore=S.matches.filter(m=>m.status==='finished').length;
    await importSchedule(S.cfg?.api_key||'123');
    await loadScoringInputs();
    const finishedAfter=S.matches.filter(m=>m.status==='finished').length;
    if(S.matches.length!==before||finishedAfter!==finishedBefore||S.tab==='lb'){
      const a=document.activeElement;
      if(!(a&&a.tagName==='INPUT'))render();
    }
  }catch(e){console.warn('Refresh:',e.message);}
}

async function loadAll(){
  await loadConfig();
  await loadMatches();
  await ensureFixtures(); // festen Gruppen-Spielplan sicherstellen, alte Duplikate entfernen
  // Bereinigung: Platzhalter / fehlklassifizierte Spiele (unbekannte Teams) entfernen
  const bad=S.matches.filter(m=>!TEAM2GROUP[m.home_team]||!TEAM2GROUP[m.away_team]);
  if(bad.length){
    try{await db.from('matches').delete().in('match_key',bad.map(m=>m.match_key));await loadMatches();}
    catch(e){console.warn('Cleanup:',e.message);}
  }
  // Vor Abschluss der Gruppenphase kann es keine echten K.-o.-Spiele geben -> Altlasten entfernen
  const groupsDone=Object.keys(GROUPS).every(groupFinished);
  if(!groupsDone){
    const ko=S.matches.filter(m=>m.stage!=='group');
    if(ko.length){
      try{await db.from('matches').delete().in('match_key',ko.map(m=>m.match_key));await loadMatches();}
      catch(e){console.warn('KO-Cleanup:',e.message);}
    }
  }
  backgroundRefresh(); // Resultate rollierend aus der API nachziehen (nicht blockierend)
  await loadPlayers();
  await loadScoringInputs();
  if(S.me)await loadMine();
}

function showSetupWarning(){
  $('#setupWarn').innerHTML=`<div class="setup-warn">
    <b>Noch nicht verbunden.</b> Trage oben im Code <code>SUPABASE_URL</code> und <code>SUPABASE_ANON_KEY</code> ein
    (Werte aus deinem Supabase-Projekt), führe das mitgelieferte SQL aus und lade die Seite neu.
  </div>`;
}

document.querySelectorAll('#nav button').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));

(async function init(){
  if(!configured){showSetupWarning();return;}
  // gespeicherte Anmeldung
  try{const saved=JSON.parse(localStorage.getItem('wm26_me')||'null');if(saved&&saved.id)S.me=saved;}catch(e){}
  try{
    await loadAll();
  }catch(e){
    console.error(e);
    $('#setupWarn').innerHTML=`<div class="setup-warn"><b>Verbindung fehlgeschlagen.</b> Prüfe Supabase-URL/Key und ob das SQL ausgeführt wurde.<br><span class="note">${esc(e.message)}</span></div>`;
  }
  render();
})();
</script>
